services:
  postgres:
    image: postgres:16-alpine
    container_name: rag_chatbot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rag_chatbot
      POSTGRES_PASSWORD: rag_chatbot_dev
      POSTGRES_DB: rag_chatbot
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_chatbot -d rag_chatbot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
